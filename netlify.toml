# Netlify — frontend + serverless API (ไม่ต้องใช้ Render)

[build]
  # อย่าใช้ base = "frontend" — จะทำให้ functions ไปอยู่ที่ frontend/netlify/functions (ไม่มีจริง)
  command = "npm ci --prefix netlify/functions && npm ci --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_NETLIFY_ONLY = "true"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
